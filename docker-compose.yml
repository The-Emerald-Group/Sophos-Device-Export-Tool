services:
  sophos-export:
    image: samuelstreets/sophos-device-export:latest
    container_name: sophos-export
    ports:
      - "8082:8080"
    environment:
      - SOPHOS_CLIENT_ID=#Paste Your Sophos API Client ID Here#
      - SOPHOS_CLIENT_SECRET=#Paste Your Sophos API Client Secret Here#
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: always
